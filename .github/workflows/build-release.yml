name: Build Dictionary Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compute release revision
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            revision="${GITHUB_REF_NAME#v}"
          else
            revision="0.0.0"
          fi
          echo "REVISION=$revision" >> "$GITHUB_ENV"

      - name: Build dictionary
        run: |
          python3 build_standard_yomitan_dict.py \
            --revision "$REVISION" \
            --output Nihongo-Bunkei-Jiten.zip

      - name: Extract release index
        run: python3 -c "import pathlib, zipfile; pathlib.Path('index.json').write_bytes(zipfile.ZipFile('Nihongo-Bunkei-Jiten.zip').read('index.json'))"

      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: japanese-bunkei-dictionary
          path: |
            Nihongo-Bunkei-Jiten.zip
            index.json

      - name: Create GitHub release and upload asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Nihongo-Bunkei-Jiten.zip
            index.json
          generate_release_notes: true
          fail_on_unmatched_files: true
